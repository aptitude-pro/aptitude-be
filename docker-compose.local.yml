# docker-compose -f docker-compose.local.yml up -d
# docker-compose -f docker-compose.local.yml down
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aptitude-mysql-local
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: skct_db
      MYSQL_USER: ${MYSQL_USER:-skct}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skct-backend-local
    env_file:
      - .env
    environment:
      DB_USERNAME: ${MYSQL_USER:-skct}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    networks:
      - local-net

networks:
  local-net:
    driver: bridge

volumes:
  mysql_local_data:
  uploads: