version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aptitude-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: skct_db
      MYSQL_USER: ${MYSQL_USER:-skct}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aptitude-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skct-backend
    environment:
      DB_USERNAME: ${MYSQL_USER:-skct}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.aptitude-pro.shop`)"
      - "traefik.http.routers.backend.entrypoints=https"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.docker.network=coolify"
    networks:
      aptitude-net:
        aliases:
          - aptitude-backend
      coolify: {}

  prometheus:
    image: prom/prometheus:latest
    container_name: aptitude-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - aptitude-net

  grafana:
    image: grafana/grafana:latest
    container_name: aptitude-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.aptitude-pro.shop`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.docker.network=coolify"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - aptitude-net
      - coolify

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: aptitude-zipkin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zipkin.rule=Host(`zipkin.aptitude-pro.shop`)"
      - "traefik.http.routers.zipkin.entrypoints=https"
      - "traefik.http.routers.zipkin.tls=true"
      - "traefik.http.routers.zipkin.tls.certresolver=letsencrypt"
      - "traefik.http.services.zipkin.loadbalancer.server.port=9411"
      - "traefik.docker.network=coolify"
    networks:
      - aptitude-net
      - coolify

networks:
  aptitude-net:
    name: aptitude-net
    driver: bridge
  coolify:
    external: true
    name: coolify

volumes:
  mysql_data:
  uploads:
  grafana_data: