version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aptitude-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: skct_db
      MYSQL_USER: ${MYSQL_USER:-skct}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aptitude-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skct-backend
    environment:
      DB_USERNAME: ${MYSQL_USER:-skct}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      zipkin:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    networks:
      - aptitude-net

  # ── 모니터링 ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: aptitude-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - aptitude-net

  grafana:
    image: grafana/grafana:latest
    container_name: aptitude-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aptitude-net

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: aptitude-zipkin
    ports:
      - "9411:9411"
    networks:
      - aptitude-net

networks:
  aptitude-net:
    name: aptitude-net
    driver: bridge

volumes:
  mysql_data:
  uploads:
  grafana_data:
